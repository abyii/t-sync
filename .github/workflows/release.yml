name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.variant }} for ${{ matrix.platform.goos }}/${{ matrix.platform.goarch }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      matrix:
        variant: [s3-only, oci-only, full]
        platform:
          - { os: ubuntu-latest, goos: linux, goarch: amd64 }
          - { os: ubuntu-latest, goos: linux, goarch: arm64 }
          - { os: windows-latest, goos: windows, goarch: amd64 }
          - { os: macos-latest, goos: darwin, goarch: amd64 }
          - { os: macos-latest, goos: darwin, goarch: arm64 }
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Determine Build Tags
        id: tags
        shell: bash
        run: |
          if [ "${{ matrix.variant }}" == "s3-only" ]; then
            echo "tags=s3" >> $GITHUB_OUTPUT
            echo "suffix=s3" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.variant }}" == "oci-only" ]; then
            echo "tags=oci" >> $GITHUB_OUTPUT
            echo "suffix=oci" >> $GITHUB_OUTPUT
          else
            echo "tags=s3 oci" >> $GITHUB_OUTPUT
            echo "suffix=full" >> $GITHUB_OUTPUT
          fi

      - name: Build Binary
        shell: bash
        run: |
          BINARY_NAME="t-sync-${{ steps.tags.outputs.suffix }}-${{ matrix.platform.goos }}-${{ matrix.platform.goarch }}"
          if [ "${{ matrix.platform.goos }}" == "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          
          mkdir -p out
          CGO_ENABLED=0 GOOS=${{ matrix.platform.goos }} GOARCH=${{ matrix.platform.goarch }} \
          go build -v -tags "${{ steps.tags.outputs.tags }}" \
          -ldflags="-s -w" \
          -o "out/${BINARY_NAME}" .
          
          echo "BINARY_PATH=out/${BINARY_NAME}" >> $GITHUB_ENV

      - name: Compress with UPX
        uses: svenstaro/upx-action@v2
        with:
          files: ${{ env.BINARY_PATH }}
          args: --best --lzma
          strip: false
        continue-on-error: true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: t-sync-${{ matrix.variant }}-${{ matrix.platform.goos }}-${{ matrix.platform.goarch }}
          path: ${{ env.BINARY_PATH }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-artifacts
          pattern: t-sync-*
          merge-multiple: true

      - name: GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./release-artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
